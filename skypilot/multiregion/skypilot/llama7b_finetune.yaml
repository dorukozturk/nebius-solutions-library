run: |
  set -euo pipefail
  if [ -z "${HF_TOKEN:-}" ]; then
    echo "HF_TOKEN is required"
    exit 1
  fi
  NPROC_PER_NODE="${NPROC_PER_NODE:-$(python -c 'import torch; print(max(1, torch.cuda.device_count()))')}"
  echo "Using nproc_per_node=${NPROC_PER_NODE}"
  torchrun --nproc_per_node="${NPROC_PER_NODE}" skypilot/llama7b_finetune.py \
    --model "${MODEL_ID:-meta-llama/Llama-2-7b-hf}" \
    --output-dir "${OUTPUT_DIR:-/tmp/llama-wizardlm-finetune}" \
    --num-epochs "${NUM_EPOCHS:-5}" \
    --batch-size "${BATCH_SIZE:-16}" \
    --gradient-accum-steps "${GRAD_ACCUM_STEPS:-8}" \
    --logging-steps "${LOGGING_STEPS:-1}" \
    --eval-strategy "${EVAL_STRATEGY:-epoch}" \
    ${EVAL_STEPS:+--eval-steps "${EVAL_STEPS}"} \
    --max-seq-length "${MAX_SEQ_LENGTH:-512}" \
    --max-samples "${MAX_SAMPLES:-20000}"
